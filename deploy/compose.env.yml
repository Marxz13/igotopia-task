# Env overlay merged onto the VM's docker-compose.yml during CD:
#   docker compose -f docker-compose.yml -f compose.env.yml up -d
# The base VM compose (SESSION_SECRET, Caddy, volumes) stays untouched; this file is
# the version-controlled home for the runtime tuning env, so it can't silently drift
# out of the running stack the way it did when it lived only in docker-compose.prod.yml.
#
# STAGE_DELAY_MS is the important one: without it the worker's per-stage pause is 0, so
# discover/verify finish in ms — the stage delay isn't watchable and a cancel can never
# land before completion. The rate-limit vars are set explicitly rather than riding on
# code defaults.
services:
  app:
    environment:
      STAGE_DELAY_MS: '3000'
      RATE_LIMIT_MAX: '3'
      RATE_LIMIT_WINDOW_MS: '10000'
  worker:
    environment:
      STAGE_DELAY_MS: '3000'
      RATE_LIMIT_MAX: '3'
      RATE_LIMIT_WINDOW_MS: '10000'
