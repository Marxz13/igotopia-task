name: deploy

# Build an image and roll it out to the single always-on VM. Runs only on a
# version tag or manual dispatch - never on a normal push - so unconfigured
# repos don't get red runs.
#
# Required repo secrets (Settings -> Secrets -> Actions):
#   SSH_HOST   VM hostname/IP
#   SSH_USER   deploy user on the VM
#   SSH_KEY    private key authorized on the VM
#   GHCR_TOKEN PAT with read:packages (only if the image is private)
# VM prep (once): docker + compose installed; this repo's docker-compose.prod.yml +
#   deploy/Caddyfile at ~/lead-discovery; a ~/lead-discovery/.env with SESSION_SECRET
#   and SITE_ADDRESS=your.domain (for auto-TLS).
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build + push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: roll out to VM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (expand migration, worker recreate, health-gated app)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/lead-discovery
            export APP_IMAGE=${{ env.IMAGE }}:${{ needs.build.outputs.tag }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
            docker compose -f docker-compose.prod.yml pull app worker init
            # expand (backward-compatible) migrations before swapping the app
            docker compose -f docker-compose.prod.yml run --rm init
            # recreate worker, then the app; Caddy's health check routes only
            # once /api/health is 200. (Full blue-green flip is the multi-node
            # step described in the README.)
            docker compose -f docker-compose.prod.yml up -d --no-build --no-deps worker app
            docker image prune -f
